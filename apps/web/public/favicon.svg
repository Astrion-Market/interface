<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- White background -->
  <rect width="32" height="32" rx="5" fill="#ffffff"/>
  <defs>
    <linearGradient id="fl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BA5F5"/>
      <stop offset="100%" stop-color="#12C4E0"/>
    </linearGradient>
    <radialGradient id="fg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4DA8FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4DA8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Scale the 56×56 mark into 32×32 with 2px padding: scale = 28/56 = 0.5, offset = 2 -->
  <g transform="translate(2 2) scale(0.5)">
    <g transform="translate(2 2)">
      <circle cx="26" cy="26" r="24" fill="url(#fg)"/>
      <!-- Main orbital ring — thicker -->
      <ellipse cx="26" cy="26" rx="20" ry="20" stroke="#4DA8FF" stroke-width="1.4" opacity="0.3" fill="none"/>
      <!-- Tilted equatorial ring — thicker -->
      <ellipse cx="26" cy="26" rx="20" ry="8" stroke="url(#fl)" stroke-width="1.6" opacity="0.7" fill="none" transform="rotate(-22 26 26)"/>
      <!-- Constellation lines — bolder -->
      <path d="M11 18 L26 26 L41 14 M26 26 L34 40 M26 26 L16 36"
            stroke="url(#fl)" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
      <!-- Stars and nodes — bolder -->
      <g fill="url(#fl)">
        <!-- Large 4-pointed star top-right -->
        <path d="M41 7 L43.4 14.4 L50 16 L43.4 17.6 L41 25 L38.6 17.6 L32 16 L38.6 14.4 Z"/>
        <!-- Small 4-pointed star top-left -->
        <path d="M11 13 L12.2 17 L16 18 L12.2 19 L11 23 L9.8 19 L6 18 L9.8 17 Z"/>
        <!-- Center dot -->
        <circle cx="26" cy="26" r="3"/>
        <!-- Bottom-right small star -->
        <path d="M34 37 L35 40.5 L38 41 L35 41.5 L34 45 L33 41.5 L30 41 L33 40.5 Z"/>
        <!-- Small nodes -->
        <circle cx="16" cy="36" r="1.8"/>
        <circle cx="44" cy="32" r="1.6" opacity="0.8"/>
      </g>
    </g>
  </g>
</svg>
