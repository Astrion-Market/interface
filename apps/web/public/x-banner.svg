<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <radialGradient id="glowTR" cx="88%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#4DA8FF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4DA8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="10%" cy="82%" r="40%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0L0 0 0 56" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <linearGradient id="ml" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6CB6FF"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="mg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4DA8FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4DA8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1500" height="500" fill="#0A0B0D"/>
  <rect width="1500" height="500" fill="url(#grid)"/>
  <rect width="1500" height="500" fill="url(#glowTR)"/>
  <rect width="1500" height="500" fill="url(#glowBL)"/>
  <rect x="0.5" y="0.5" width="1499" height="499" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="260" height="2.5" fill="url(#ml)" opacity="0.9"/>

  <!-- Logo mark: scale 3.0 → 168×168px, centered vertically at y=166 -->
  <g transform="translate(100, 166) scale(3.0)">
    <g transform="translate(2 2)">
      <circle cx="26" cy="26" r="24" fill="url(#mg)"/>
      <ellipse cx="26" cy="26" rx="20" ry="20" stroke="rgba(77,168,255,0.35)" stroke-width="0.8" fill="none"/>
      <ellipse cx="26" cy="26" rx="20" ry="8" stroke="url(#ml)" stroke-width="1.0" fill="none" transform="rotate(-22 26 26)"/>
      <path d="M11 18 L26 26 L41 14 M26 26 L34 40 M26 26 L16 36" stroke="url(#ml)" stroke-width="1.0" stroke-linecap="round" opacity="0.85"/>
      <g fill="url(#ml)">
        <path d="M41 7 L43.0 13.8 L49 15 L43.0 16.2 L41 23 L39.0 16.2 L33 15 L39.0 13.8 Z"/>
        <path d="M11 13 L12.0 16.8 L15 18 L12.0 19.2 L11 23 L10.0 19.2 L7 18 L10.0 16.8 Z"/>
        <circle cx="26" cy="26" r="2.8"/>
        <path d="M34 37 L34.8 40.2 L37 41 L34.8 41.8 L34 45 L33.2 41.8 L31 41 L33.2 40.2 Z"/>
        <circle cx="16" cy="36" r="1.5"/>
        <circle cx="44" cy="32" r="1.3" opacity="0.8"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="298" y="207"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="52" font-weight="700" letter-spacing="-2"
        fill="#F5F7FB">Astrion</text>

  <!-- Eyebrow -->
  <circle cx="298" cy="238" r="4.5" fill="#6CB6FF"/>
  <text x="315" y="244"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="12" font-weight="400" letter-spacing="2.2"
        fill="#5A6068">STELLAR · HYBRID LENDING PROTOCOL</text>

  <!-- Tagline -->
  <text x="298" y="306"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="44" font-weight="500" letter-spacing="-2"
        fill="#F5F7FB">The credit layer</text>

  <text x="298" y="354"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="44" font-weight="500" letter-spacing="-2"
        fill="#F5F7FB">
    <tspan font-style="italic" font-weight="400" fill="#6CB6FF">for</tspan>
    <tspan> Stellar.</tspan>
  </text>

  <!-- Subline -->
  <text x="298" y="394"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="16" font-weight="400"
        fill="#8A8F98">Supply, borrow, and earn across Core and Isolated markets — non-custodial.</text>

  <!-- Decorative right-side sparkles -->
  <g opacity="0.25" fill="url(#ml)">
    <!-- Large star top-right area -->
    <path d="M1320 120 L1322.4 127.6 L1330 130 L1322.4 132.4 L1320 140 L1317.6 132.4 L1310 130 L1317.6 127.6 Z"/>
    <!-- Medium star -->
    <path d="M1420 230 L1421.8 235.8 L1428 237 L1421.8 238.2 L1420 244 L1418.2 238.2 L1412 237 L1418.2 235.8 Z"/>
    <!-- Small dot -->
    <circle cx="1380" cy="180" r="2.2"/>
    <circle cx="1460" cy="310" r="1.8"/>
    <circle cx="1290" cy="350" r="1.5" opacity="0.6"/>
    <!-- Small star bottom-right -->
    <path d="M1350 380 L1351.5 385 L1356 386 L1351.5 387 L1350 392 L1348.5 387 L1344 386 L1348.5 385 Z"/>
  </g>

  <!-- Bottom-right watermark -->
  <text x="1465" y="476"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="11" font-weight="400" letter-spacing="1.5"
        fill="rgba(90,96,104,0.45)" text-anchor="end">ASTRION · STELLAR</text>
</svg>
